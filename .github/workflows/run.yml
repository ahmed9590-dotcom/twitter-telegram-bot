name: Twitter Telegram Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_ACCOUNT:   ${{ secrets.TARGET_ACCOUNT }}
          TW_USERNAME:      ${{ secrets.TW_USERNAME }}
          TW_EMAIL:         ${{ secrets.TW_EMAIL }}
          TW_PASSWORD:      ${{ secrets.TW_PASSWORD }}
        run: python main.py

      - name: Save last tweet ID
        run: |
          git config user.email "bot@github.com"
          git config user.name "Bot"
          git add last_tweet_id.txt
          git diff --staged --quiet || git commit -m "update last tweet id"
          git push
          
